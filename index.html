    <title>아마겟돈 클래스</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" rel="stylesheet" />

  </head>
  <body>
    <div id="root">
      <style>
        #splash{position:fixed;inset:0;z-index:99999;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .4s ease}
        #splash.hide{opacity:0;pointer-events:none}
        #splash img{height:48px;margin-bottom:24px}
        #splash .bar{width:120px;height:2px;background:#222;border-radius:2px;overflow:hidden}
        #splash .bar::after{content:'';display:block;width:40%;height:100%;background:#2ED573;border-radius:2px;animation:splash-load 1.2s ease-in-out infinite}
        @keyframes splash-load{0%{transform:translateX(-100%)}100%{transform:translateX(350%)}}
      </style>
      <div id="splash">
        <img src="/logo.webp" alt="아마겟돈 클래스" />
        <div class="bar"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
